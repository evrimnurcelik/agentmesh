app = "agentmesh-api"
primary_region = "fra"   # Frankfurt — change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  MATCH_MIN_SCORE = "40"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0   # scale to zero when idle — set to 1 for always-on

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/health"
    port = 8080
    timeout = "5s"
    type = "http"
