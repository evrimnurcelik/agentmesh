ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [io.agentmesh.ApplicationKt.module]
    }
}

database {
    url      = ${?DATABASE_URL}
    user     = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
    poolSize = 10
    poolSize = ${?DATABASE_POOL_SIZE}
}

agentmesh {
    webhookSecret       = "dev_secret_change_me"
    webhookSecret       = ${?WEBHOOK_SECRET}
    adminSecret         = "dev_admin_secret"
    adminSecret         = ${?ADMIN_SECRET}
    stripeWebhookSecret = ""
    stripeWebhookSecret = ${?STRIPE_WEBHOOK_SECRET}
    matchMinScore       = 40
    matchMinScore       = ${?MATCH_MIN_SCORE}
}
